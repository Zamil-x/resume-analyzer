<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Analyzer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="container">
        <h1>📋 Resume Analyzer</h1>
        <p class="subtitle">Get instant feedback on your resume with AI-powered analysis</p>

        <form action="/upload" method="post" enctype="multipart/form-data" id="uploadForm">
            <div class="file-input-wrapper">
                <input type="file" name="resume" id="fileInput" accept=".pdf,.docx" required>
                <label for="fileInput" class="file-input-label">
                    📁 Click to upload or drag and drop
                    <div class="file-name">PDF or DOCX (Max 10MB)</div>
                </label>
            </div>

            <button type="submit">Analyze Resume</button>
        </form>
    </div>

    <script>
        // Drag and drop functionality
        const fileInput = document.getElementById('fileInput');
        const fileLabel = document.querySelector('.file-input-label');

        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            fileLabel.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            fileLabel.addEventListener(eventName, () => {
                fileLabel.style.background = '#f0f0ff';
            });
        });

        ['dragleave', 'drop'].forEach(eventName => {
            fileLabel.addEventListener(eventName, () => {
                fileLabel.style.background = '#f5f5f5';
            });
        });

        fileLabel.addEventListener('drop', (e) => {
            const dt = e.dataTransfer;
            const files = dt.files;
            fileInput.files = files;
            updateFileName();
        });

        fileInput.addEventListener('change', updateFileName);

        function updateFileName() {
            const fileName = fileInput.files[0]?.name;
            if (fileName) {
                document.querySelector('.file-name').textContent = `Selected: ${fileName}`;
            }
        }
    </script>
</body>
</html>
